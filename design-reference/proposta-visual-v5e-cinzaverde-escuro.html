<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Proposta visual v5e — cinza-verde escuro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600&family=Space+Mono:wght@700&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1C1F1E;
    --surface: #262B29;
    --border: #3A423E;
    --text-primary: #E8EDE9;
    --text-secondary: #8A968C;
    --green: #3DDC6E;
    --green-dim: #17301F;
    --gold: #FFC93C;
    --gold-dim: #362B10;
    --red: #FF6B5C;
    --red-dim: #3A1E19;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--text-primary); font-family: 'IBM Plex Sans', sans-serif; display: flex; min-height: 100vh; }
  .sidebar { width: 220px; background: var(--surface); border-right: 4px solid var(--border); padding: 24px 16px; flex-shrink: 0; }
  .logo { font-family: 'Fredoka', sans-serif; font-weight: 600; font-size: 20px; color: var(--green); margin-bottom: 32px; }
  .nav-item { padding: 10px 12px; border: 3px solid transparent; border-radius: 10px; color: var(--text-secondary); font-size: 14px; margin-bottom: 6px; font-weight: 500; }
  .nav-item.active { background: var(--green-dim); border-color: var(--border); color: var(--text-primary); }
  .main { flex: 1; padding: 36px 44px; max-width: 900px; }
  h1 { font-family: 'Fredoka', sans-serif; font-size: 26px; font-weight: 600; margin: 0 0 24px; color: var(--text-primary); }
  .metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 32px; }
  .box { background: var(--surface); border: 3px solid var(--border); border-radius: 14px; padding: 18px; margin-bottom: 12px; box-shadow: 4px 4px 0 var(--border); }
  .metric-label { font-family: 'Fredoka', sans-serif; font-size: 13px; color: var(--text-secondary); margin-bottom: 8px; font-weight: 500; }
  .metric-value { font-family: 'Space Mono', monospace; font-weight: 700; font-size: 24px; }
  .metric-value.green { color: var(--green); }
  .metric-value.red { color: var(--red); }
  .list-header { font-family: 'Fredoka', sans-serif; font-size: 15px; color: var(--text-secondary); margin-bottom: 14px; font-weight: 500; }
  .orcamento-row { display: flex; align-items: center; justify-content: space-between; }
  .orc-info { display: flex; flex-direction: column; gap: 4px; }
  .orc-nome { font-weight: 500; font-size: 15px; }
  .orc-cliente { font-size: 13px; color: var(--text-secondary); }
  .orc-right { display: flex; align-items: center; gap: 16px; }
  .orc-valor { font-family: 'Space Mono', monospace; font-weight: 700; font-size: 16px; }
  .badge { font-family: 'Fredoka', sans-serif; font-size: 12px; padding: 5px 12px; border-radius: 999px; font-weight: 500; }
  .badge.pendente { background: var(--gold-dim); color: var(--gold); }
  .badge.aceito { background: var(--green-dim); color: var(--green); }
  .badge.recusado { background: var(--red-dim); color: var(--red); }
</style>
</head>
<body>
  <div class="sidebar">
    <div class="logo">calc3d</div>
    <div class="nav-item">Estoque</div>
    <div class="nav-item">Calculadora</div>
    <div class="nav-item active">Orçamentos</div>
    <div class="nav-item">Máquinas</div>
    <div class="nav-item">Receita</div>
  </div>
  <div class="main">
    <h1>Orçamentos</h1>
    <div class="metrics">
      <div class="box"><div class="metric-label">Receita este mês</div><div class="metric-value green">R$ 2.847,50</div></div>
      <div class="box"><div class="metric-label">Pendentes</div><div class="metric-value">4</div></div>
      <div class="box"><div class="metric-label">Estoque baixo</div><div class="metric-value red">2 itens</div></div>
    </div>
    <div class="list-header">Recentes</div>
    <div class="box orcamento-row">
      <div class="orc-info"><div class="orc-nome">Suporte de celular personalizado</div><div class="orc-cliente">Maria Silva</div></div>
      <div class="orc-right"><span class="orc-valor">R$ 89,90</span><span class="badge pendente">Pendente</span></div>
    </div>
    <div class="box orcamento-row">
      <div class="orc-info"><div class="orc-nome">Chaveiro logo empresa</div><div class="orc-cliente">João Pereira</div></div>
      <div class="orc-right"><span class="orc-valor">R$ 24,00</span><span class="badge aceito">Aceito</span></div>
    </div>
    <div class="box orcamento-row">
      <div class="orc-info"><div class="orc-nome">Peça de reposição</div><div class="orc-cliente">Ana Costa</div></div>
      <div class="orc-right"><span class="orc-valor">R$ 45,30</span><span class="badge recusado">Recusado</span></div>
    </div>
  </div>
</body>
</html>
